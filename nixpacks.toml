# Do not override [phases.install] — that removes Node/npm from the image (Railway/Railpack).
# Git LFS runs in the build phase after the default `npm ci` from the Node provider.

[phases.setup]
nixPkgs = ["git", "git-lfs"]

[phases.build]
cmds = [
  "if [ -d .git ]; then git lfs install && git lfs pull; fi"
]
