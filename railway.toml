# Railway: connect this repo, leave defaults; Railway sets PORT automatically.
# Docs: https://docs.railway.com/reference/config-as-code

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Sync data/experiences.json, data/projects.json, and other data/*.json into Postgres before the new release goes live.
# Requires DATABASE_URL (Railway Postgres). Skips harmlessly if unset. Binary assets ship in the image; JSON only stores paths.
# One array element only (Railway schema); full command as a single string.
preDeployCommand = ["npm run db:seed"]
startCommand = "npm start"
healthcheckPath = "/"
healthcheckTimeout = 60
